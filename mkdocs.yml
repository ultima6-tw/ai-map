site_name: AI Resource Map
site_url: https://ultima6-tw.github.io/ai-map/
repo_url: https://github.com/ultima6-tw/ai-map

theme:
  name: material
  language: en
  edit_uri: edit/main/docs/
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.action.view

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - 繁體中文 (ZH):
    - 概念:
      - 什麼是 AI/LLM?: zh/what-is-ai-or-llm.md
      - 如何獲得最佳 LLM: zh/how-get-best-llm.md
      - Agent 基礎: zh/agent.md
    - 資源:
      - AI 應用: zh/ai-application.md
      - AI 新聞: zh/ai-news.md
    - 影響與工具:
      - AI 影響: zh/ai-impact.md
      - QMD 工具: zh/qmd.md
      - AI 幻覺: zh/ai-hallucination.md
  - English (EN):
    - Concepts:
      - What is AI/LLM?: en/what-is-ai-or-llm.md
      - How to get best LLM: en/how-get-best-llm.md
      - Agent Basics: en/agent.md
    - Resources:
      - AI Applications: en/ai-application.md
      - AI News: en/ai-news.md
    - Impact & Tools:
      - AI Impact: en/ai-impact.md
      - QMD Tool: en/qmd.md
      - AI Hallucination: en/ai-hallucination.md
