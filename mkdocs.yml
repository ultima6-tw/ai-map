      - AI 應用與案例: zh/ai-application.md
      - AI 幻覺與預防: zh/ai-hallucination.md
      - 社會影響與挑戰: zh/ai-impact.md
      - 🇹🇼 數位主權與 TAIDE: zh/digital-sovereignty.md
    - 🛠️ 實戰應用 (Practical):
      - 🏠 本地模型與隱私: zh/local-ai-privacy.md
      - 🖥️ 程式開發: zh/tools-coding.md
      - 🎨 影像生成: zh/tools-image.md
      - 🧠 Agent 智能體: zh/agent.md
      - 🔍 學術研究工作流: zh/research-workflow.md
    - 🧠 深入技術與優化 (Optimization):
