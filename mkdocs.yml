site_name: AI Resource Map
site_url: https://ultima6-tw.github.io/ai-map/
repo_url: https://github.com/ultima6-tw/ai-map

theme:
  name: material
  language: en
  edit_uri: edit/main/docs/
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.action.view

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - 繁體中文 (ZH):
    - 🧩 [科普] AI 基礎與生活:
      - 什麼是 AI/LLM?: zh/what-is-ai-or-llm.md
      - AI 應用與案例: zh/ai-application.md
      - AI 對我們的影響: zh/ai-impact.md
      - 安全使用 (防幻覺): zh/ai-hallucination.md
    - 🔬 [科研] 專業實戰與工具:
      - 如何獲得最佳 LLM: zh/how-get-best-llm.md
      - Agent 智能體基礎: zh/agent.md
      - QMD 本地知識引擎: zh/qmd.md
    - 📢 最新新聞: zh/ai-news.md
  - English (EN):
    - 🧩 [General] AI Basics & Life:
      - What is AI/LLM?: en/what-is-ai-or-llm.md
      - AI Applications: en/ai-application.md
      - AI Impacts: en/ai-impact.md
      - Safe Usage (Hallucination): en/ai-hallucination.md
    - 🔬 [Scientific] Research & Tools:
      - How to get best LLM: en/how-get-best-llm.md
      - Agent Basics: en/agent.md
      - QMD Local Knowledge: en/qmd.md
    - 📢 AI News: en/ai-news.md
